#config_version=6
hardware:
  segment_displays: light_segment_displays

segment_displays:
  display_p1:
    size: 6
    number: 1
    default_transition_update_hz: 24
  display_p2:
    size: 6
    number: 1
    default_transition_update_hz: 24
  display_credit:
    size: 2
    number: 1
    default_transition_update_hz: 24
  display_tilt:
    size: 2
    number: 1
    default_transition_update_hz: 24

# The remainder of this file sets up the screen display version of segment displays w/ backglass
virtual_segment_display_connector:
  segment_displays: display_p1, display_p2, display_credit, display_tilt

