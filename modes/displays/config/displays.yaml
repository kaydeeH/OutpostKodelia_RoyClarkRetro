      x: 351
      y: 136
      z: 180
  w_ball3:
    - type: image
      image: RedBulb3
      x: 400
      y: 136
      z: 180
  w_ball4:
    - type: image
      image: RedBulb3
      x: 448
      y: 136
      z: 180
  w_ball5:
    - type: image
      image: RedBulb3
      x: 496
      y: 136
      z: 180

widget_player:
  tilt_warning:
    tilt_warning_widget:
      slide: screen_segement_display
      priority: 10
  tilt:
    tilt_widget:
      slide: screen_segement_display
      priority: 10
  mode_base_started{ball==1}:
    w_ball1:
      slide: screen_segement_display
      priority: 10
  mode_base_started{ball==2}:
    w_ball1:
      slide: screen_segement_display
      priority: 10
      action: remove
    w_ball2:
      slide: screen_segement_display
      priority: 10
  mode_base_started{ball==3}:
    w_ball2:
      slide: screen_segement_display
      priority: 10
      action: remove
    w_ball3:
      slide: screen_segement_display
      priority: 10
  mode_base_started{ball==4}:
    w_ball3:
      slide: screen_segement_display
      priority: 10
      action: remove
    w_ball4:
      slide: screen_segement_display
      priority: 10
  mode_base_started{ball==5}:
    w_ball4:
      slide: screen_segement_display
      priority: 10
      action: remove
    w_ball5:
      slide: screen_segement_display
      priority: 10
  game_will_end:
    w_ball5:
      slide: screen_segement_display
      priority: 10
      action: remove